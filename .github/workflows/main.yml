name: Build and deploy

on:
  # Push to main and tag push
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm install
      - name: Build project
        run: npm run build
      - name: Deploy to server
        if: github.repository == 'weirdgloop/osrs-leagues-6-planner'
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/client/"
          TARGET: "/var/www/html/demonic-pacts/"
          SCRIPT_AFTER: |
            whoami
            echo $RSYNC_STDOUT
      - name: Purge cache on Cloudflare
        if: github.repository == 'weirdgloop/osrs-leagues-6-planner'
        run: |
          curl --request POST \
            --url https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE }}/purge_cache \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}' \
            --data '{
              "prefixes": [
                "tools.runescape.wiki/demonic-pacts"
              ]
            }'
